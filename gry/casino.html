<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>KRUPNIK KASINO GAME</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0b0b0b,#1b1b1b);
    color:#ffd700;
    text-align:center;
}

.container{
    margin-top:120px;
}

.download{
    display:inline-block;
    margin-top:40px;
    padding:20px 60px;
    font-size:28px;
    background:#ffd700;
    color:black;
    text-decoration:none;
    border-radius:14px;
    font-weight:bold;
}

.download:hover{
    background:#ffcc00;
}

.captchaBox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
}

.captchaContent{
    background:#111;
    padding:40px;
    border-radius:12px;
}

canvas{
    background:white;
    margin:15px 0;
}

input{
    padding:10px;
    font-size:18px;
}

button{
    margin-top:10px;
    padding:10px 20px;
    background:#ffd700;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>🎰 KRUPNIK KASINO GAME</h1>

<a class="download" href="#" onclick="openCaptcha()">
Pobierz grę
</a>

</div>

<div id="captchaBox" class="captchaBox">
<div class="captchaContent">

<h2>Przepisz kod z obrazka</h2>

<canvas id="captchaCanvas" width="200" height="80"></canvas>

<br>

<input id="captchaInput" placeholder="Przepisz kod">

<br>

<button onclick="verifyCaptcha()">Potwierdź</button>
<button onclick="generateCaptcha()">Nowy kod</button>

</div>
</div>

<script>

let captchaText = "";

function generateCaptcha(){

    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    captchaText = "";

    for(let i=0;i<5;i++){
        captchaText += chars.charAt(Math.floor(Math.random()*chars.length));
    }

    const canvas = document.getElementById("captchaCanvas");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,200,80);

    ctx.font = "35px Arial";
    ctx.fillStyle = "black";

    for(let i=0;i<captchaText.length;i++){

        let x = 20 + i*30;
        let y = 40 + Math.random()*10;

        let angle = (Math.random()-0.5)*0.5;

        ctx.save();
        ctx.translate(x,y);
        ctx.rotate(angle);
        ctx.fillText(captchaText[i],0,0);
        ctx.restore();
    }

    for(let i=0;i<5;i++){
        ctx.beginPath();
        ctx.moveTo(Math.random()*200,Math.random()*80);
        ctx.lineTo(Math.random()*200,Math.random()*80);
        ctx.stroke();
    }
}

function openCaptcha(){

    document.getElementById("captchaBox").style.display="flex";
    generateCaptcha();

}

function verifyCaptcha(){

    const user = document.getElementById("captchaInput").value;

    if(user.toUpperCase() === captchaText){

        window.location.href="game.exe";

    }else{

        alert("Błędny kod CAPTCHA");
        generateCaptcha();

    }
}

</script>

</body>
</html>
