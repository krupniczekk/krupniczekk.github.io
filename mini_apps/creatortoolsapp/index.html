<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Index of /filestorage</title>
<style>
  body { font-family: "Times New Roman", Times, serif; background: white; color: black; margin: 20px; }
  a { color: blue; text-decoration: underline; }
  ul { list-style-type: none; padding-left: 20px; }
  li { margin: 2px 0; }

  .header {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .discord-link {
    font-weight: bold;
    color: black;
    text-decoration: none;
  }

  #captchaBox {
    display: none;
    position: fixed;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -30%);
    background: white;
    border: 1px solid black;
    padding: 20px;
    z-index: 999;
  }
</style>
</head>
<body>

<div class="header">
  <h1 style="margin:0;">/filestorage</h1>
  <a href="https://bit.ly/server-redirect-kw-verify" class="discord-link" target="_blank">Discord</a>
</div>

<ul>
  <li><strong>assets</strong>
    <ul>
      <li><strong>templates</strong>
        <ul>
          <li><strong>sybau</strong>
            <ul>
              <li><a href="#" onclick="startDownload('sybau/background.jpg')">background.jpg</a></li>
              <li><a href="#" onclick="startDownload('sybau/full_template.zip')">full_template.zip</a></li>
            </ul>
          </li>
          <li><strong>meme</strong>
            <ul>
              <li><a href="#" onclick="startDownload('meme_temps/fonts.zip')">fonts.zip</a></li>
            </ul>
          </li>
        </ul>
      </li>
    </ul>
  </li>
</ul>

<!-- CAPTCHA BOX -->
<div id="captchaBox">
  <p>Przepisz numerki:</p>
  <canvas id="captchaCanvas" width="120" height="40"></canvas><br><br>
  <input type="text" id="captchaInput">
  <button onclick="verifyCaptcha()">OK</button>
</div>

<script>
let currentFile = "";
let captchaCode = "";

function generateCaptcha() {
  const canvas = document.getElementById("captchaCanvas");
  const ctx = canvas.getContext("2d");

  captchaCode = "";
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < 4; i++) {
    let num = Math.floor(Math.random() * 10);
    captchaCode += num;

    ctx.font = "20px Arial";
    ctx.fillStyle = "black";
    ctx.fillText(num, 20 + i * 20, 25);
  }
}

function startDownload(file) {
  currentFile = file; // faktyczna ścieżka
  document.getElementById("captchaBox").style.display = "block";
  generateCaptcha();
}

function verifyCaptcha() {
  const input = document.getElementById("captchaInput").value;

  if (input === captchaCode) {
    window.location.href = currentFile;
  } else {
    alert("Źle wpisane numerki!");
  }
}
</script>

</body>
</html>
