<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>TT & YT for all</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

h1 {
    text-align: center;
}

.main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 20px;
}

.column {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

.card {
    background: #1a1a1a;
    padding: 10px;
    border-radius: 15px;
    width: 90%;
    max-width: 500px;
}

iframe {
    width: 100%;
    height: 300px;
    border: none;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>TT & YT for all</h1>

<div class="main">
<div class="column">
<h2>TikTok</h2>
<div id="tiktokContainer"></div>
</div>

<div class="column">
<h2>YouTube</h2>
<div id="youtubeContainer"></div>
</div>
</div>

<script async src="https://www.tiktok.com/embed.js"></script>

<script>

// =================
// NOWY KLUCZ API
const API_KEY = "AIzaSyAgDOKcY-lfPjP0wW0hTwxYEXe0iXte0Uo";

// =================
// TIKTOKI
let tiktoks = [
"7611972856301309206",
"7611947135767940382",
"7586642854655692054",
"7600000000000000000",
"7590000000000000000"
];

let usedTikToks = [];

// =================
// YOUTUBE
let usedVideos = new Set();

const queries = [
"funny",
"memes",
"gaming",
"minecraft",
"science",
"football",
"cars",
"random",
"animals",
"technology"
];

// =================
// TASOWANIE
function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

// =================
// TIKTOK LOSOWY BEZ POWTÓREK
function getRandomTikTok() {

    if (usedTikToks.length === 0) {
        usedTikToks = shuffle([...tiktoks]);
    }

    return usedTikToks.pop();
}

// =================
// DODAJ TIKTOK
function addTikTok() {

    const id = getRandomTikTok();

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
    <blockquote class="tiktok-embed"
        data-video-id="${id}"
        style="max-width: 100%;">
        <section></section>
    </blockquote>
    `;

    document.getElementById("tiktokContainer").appendChild(div);

    if (window.tiktokEmbedLoad) {
        window.tiktokEmbedLoad();
    }
}

// =================
// YOUTUBE PRAWDZIWE LOSOWE
async function addYouTube() {

    try {

        const query = queries[Math.floor(Math.random()*queries.length)];

        const url =
        `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=5&q=${query}&key=${API_KEY}`;

        const res = await fetch(url);
        const data = await res.json();

        console.log(data);

        let videoId = null;

        for (let item of data.items) {
            if (!usedVideos.has(item.id.videoId)) {
                videoId = item.id.videoId;
                usedVideos.add(videoId);
                break;
            }
        }

        if (!videoId) return;

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
        <iframe 
        src="https://www.youtube.com/embed/${videoId}"
        allowfullscreen>
        </iframe>
        `;

        document.getElementById("youtubeContainer").appendChild(div);

    } catch (err) {
        console.log("YouTube error:", err);
    }

}

// =================
// START
for (let i = 0; i < 3; i++) {
    addTikTok();
    addYouTube();
}

// =================
// SCROLL
window.addEventListener("scroll", () => {
    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) {
        addTikTok();
        addYouTube();
    }
});

</script>

</body>
</html>
